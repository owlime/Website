media:
  input: public/uploads
  output: /uploads
  rename: safe
  extensions: [jpg, jpeg, png, webp, gif, svg]

content:
  - name: site
    label: Site settings
    type: file
    path: src/data/site.json
    format: json
    fields:
      - name: name
        label: Your name
        type: string
        required: true
      - name: role
        label: Professional title
        type: string
        required: true
      - name: location
        label: Location
        type: string
      - name: email
        label: Email
        type: string
      - name: instagram
        label: Instagram URL
        type: string
      - name: instagramLabel
        label: Instagram display name
        type: string
      - name: intro
        label: Large profile statement
        type: text
        required: true
      - name: about
        label: About text
        type: text
        required: true
      - name: services
        label: Practice / services
        type: string
        list: true
      - name: clients
        label: Selected clients / publications
        type: string
        list: true
      - name: copyright
        label: Footer note
        type: text

  - name: projects
    label: Projects
    type: collection
    path: src/data/projects
    format: json
    filename: "{fields.slug}.json"
    view:
      primary: title
      fields: [title, category, year, published, order]
      sort: [order, year, title]
      default:
        sort: order
        order: asc
    fields:
      - name: title
        label: Project title
        type: string
        required: true
      - name: slug
        label: URL slug (lowercase-with-dashes)
        type: string
        required: true
      - name: year
        label: Year
        type: string
        required: true
      - name: category
        label: Category
        type: select
        options:
          values: [Editorial, Campaign, Commercial, Personal, Film, Other]
        required: true
      - name: client
        label: Client / publication
        type: string
      - name: order
        label: Display order
        type: number
        required: true
      - name: published
        label: Show on website
        type: boolean
        default: true
      - name: cover
        label: Cover image
        type: image
        required: true
      - name: description
        label: Project description
        type: text
      - name: credits
        label: Credits
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{role}: {name}"
        fields:
          - name: role
            label: Role
            type: string
          - name: name
            label: Name
            type: string
      - name: gallery
        label: Project gallery
        type: image
        options:
          multiple: true
          unique: true
          extensions: [jpg, jpeg, png, webp, gif, svg]
          rename: safe
