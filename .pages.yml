media:
  - name: images
    label: Project images
    input: public/uploads
    output: /uploads
    rename: safe
    categories: [image]
    extensions: [jpg, jpeg, png, webp, gif]

content:
  - name: site
    label: Site settings
    type: file
    path: src/data/site.json
    format: json
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - name: headline
        label: Practice
        type: string
      - name: location
        label: Location
        type: string
      - name: email
        label: Email
        type: string
      - name: instagram
        label: Instagram URL
        type: string
      - name: instagramLabel
        label: Instagram display name
        type: string
      - name: copyright
        label: Copyright
        type: string

  - name: projects
    label: Projects
    type: collection
    path: src/data/projects
    format: json
    filename:
      template: "{slug}.json"
      field: create
    view:
      primary: title
      fields: [title, year, published, order]
      sort: [order, year, title]
      default:
        sort: order
        order: asc
    fields:
      - name: title
        label: Project title
        type: string
        required: true
      - name: slug
        label: URL slug
        type: string
        required: true
      - name: year
        label: Year
        type: string
      - name: order
        label: Display order
        type: number
        required: true
      - name: published
        label: Show on website
        type: boolean
        default: true
      - name: cover
        label: Cover image
        type: image
        required: true
        options:
          media: images
          unique: true
          extensions: [jpg, jpeg, png, webp, gif]
          rename: safe
      - name: gallery
        label: Project gallery
        type: image
        options:
          media: images
          multiple: true
          unique: true
          extensions: [jpg, jpeg, png, webp, gif]
          rename: safe
      - name: credits
        label: Credits
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{role}: {name}"
        fields:
          - name: role
            label: Role
            type: string
          - name: name
            label: Name
            type: string
